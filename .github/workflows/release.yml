name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & publish
    runs-on: macos-15
    env:
      SIGN_IDENTITY: "Developer ID Application: qualified.ink GmbH (5R57LQA4MP)"
      APPLE_TEAM_ID: "5R57LQA4MP"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Determine version and paths
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          # Build number: derive a monotonic integer from the version.
          # 1.2.3 -> 10203, 12.0.0 -> 120000, etc. Each component is 0-99.
          IFS='.' read -r MAJ MIN PATCH <<<"$VERSION"
          BUILD=$(( ${MAJ:-0} * 10000 + ${MIN:-0} * 100 + ${PATCH:-0} ))
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/maczoomer-signing.keychain-db" >> "$GITHUB_ENV"
          echo "→ version=$VERSION build=$BUILD"

      - name: Pick latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          APPLE_DEV_ID_P12_BASE64: ${{ secrets.APPLE_DEV_ID_P12_BASE64 }}
          APPLE_DEV_ID_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_DEV_ID_P12_BASE64" ]]; then
            echo "::error::APPLE_DEV_ID_P12_BASE64 secret is missing"
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$APPLE_DEV_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEV_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "→ Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Release (Developer ID signed)
        run: |
          xcodebuild \
            -project MacZoomer.xcodeproj \
            -scheme MacZoomer \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --keychain $KEYCHAIN_PATH" \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.build }} \
            build

      - name: Re-sign with entitlements (deep, hardened, timestamped)
        run: |
          codesign --force --deep --sign "$SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --options runtime --timestamp \
            --entitlements Sources/MacZoomer/Resources/MacZoomer.entitlements \
            build/Build/Products/Release/MacZoomer.app

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 build/Build/Products/Release/MacZoomer.app
          codesign -dv --verbose=4 build/Build/Products/Release/MacZoomer.app

      - name: Notarize .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_ZIP="$RUNNER_TEMP/MacZoomer.zip"
          ditto -c -k --keepParent build/Build/Products/Release/MacZoomer.app "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple .app
        run: |
          xcrun stapler staple build/Build/Products/Release/MacZoomer.app
          xcrun stapler validate build/Build/Products/Release/MacZoomer.app
          spctl --assess --type execute --verbose build/Build/Products/Release/MacZoomer.app

      - name: Build signed DMG
        run: |
          mkdir -p artifacts
          MACZOOMER_SIGN_IDENTITY="$SIGN_IDENTITY" \
            scripts/make-dmg.sh \
              build/Build/Products/Release/MacZoomer.app \
              artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg \
              "MacZoomer ${{ steps.version.outputs.version }}"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple DMG
        run: |
          xcrun stapler staple artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg
          xcrun stapler validate artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg
          spctl --assess --type open --context context:primary-signature --verbose \
            artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg

      - name: Generate SHA-256 sums
        run: |
          cd artifacts
          shasum -a 256 -- *.dmg | tee SHA256SUMS.txt

      - name: Publish appcast entry to gh-pages
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: scripts/publish-appcast.sh "artifacts/MacZoomer-${VERSION}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacZoomer-${{ steps.version.outputs.version }}
          path: |
            artifacts/*.dmg
            artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MacZoomer ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/MacZoomer-${{ steps.version.outputs.version }}.dmg
            artifacts/SHA256SUMS.txt
          body: |
            ## MacZoomer ${{ steps.version.outputs.tag }}

            Signed with Developer ID and notarized by Apple. Drag
            `MacZoomer.app` from the DMG into `/Applications` and launch
            normally — no right-click → Open dance needed.

            Future versions install automatically via Sparkle.

            ### SHA-256
            ```
            $(cat artifacts/SHA256SUMS.txt)
            ```

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
