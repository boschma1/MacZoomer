name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftpm:
    name: SwiftPM build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Pick latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Build (SwiftPM)
        run: swift build -c debug

  xcode-app:
    name: Xcode app build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Pick latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project MacZoomer.xcodeproj \
            -scheme MacZoomer \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

